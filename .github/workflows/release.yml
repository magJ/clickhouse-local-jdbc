name: Release

on:
  push:
    branches: [ "main" ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GRADLE_OPTS: "-Dorg.gradle.welcome=never -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set version
        id: version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Run unit tests
        run: ./gradlew test

      - name: Install ClickHouse
        run: ./install-clickhouse.sh

      - name: Run integration tests
        run: ./gradlew integrationTest -DclickhouseLocalPath=./clickhouse-bin/clickhouse-local

      - name: Build jar
        run: ./gradlew jar -Pversion=${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          files: build/libs/clickhouse-local-jdbc-${{ steps.version.outputs.VERSION }}.jar
