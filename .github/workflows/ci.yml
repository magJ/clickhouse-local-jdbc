name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Install ClickHouse
        run: |
          curl -fsSL https://clickhouse.com/ | sh
          sudo install -m 755 clickhouse /usr/local/bin/clickhouse
          sudo ln -sf /usr/local/bin/clickhouse /usr/local/bin/clickhouse-local
          clickhouse-local --version

      - name: Run integration tests
        run: ./gradlew integrationTest
