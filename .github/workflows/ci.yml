name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GRADLE_OPTS: "-Dorg.gradle.welcome=never -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run unit tests
        run: ./gradlew test

      - name: Install ClickHouse
        env:
          CLICKHOUSE_VERSION: "26.2.4.23"
        run: |
          curl -fsSL "https://github.com/ClickHouse/ClickHouse/releases/download/v${CLICKHOUSE_VERSION}-stable/clickhouse-common-static_${CLICKHOUSE_VERSION}_amd64.deb" \
            -o /tmp/clickhouse.deb
          sudo dpkg -i /tmp/clickhouse.deb
          sudo ln -sf /usr/bin/clickhouse /usr/local/bin/clickhouse-local
          clickhouse-local --version

      - name: Run integration tests
        run: ./gradlew integrationTest
