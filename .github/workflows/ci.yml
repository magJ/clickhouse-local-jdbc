name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GRADLE_OPTS: "-Dorg.gradle.welcome=never -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run unit tests
        run: ./gradlew test

      - name: Install ClickHouse
        run: ./install-clickhouse.sh

      - name: Run integration tests
        run: ./gradlew integrationTest -DclickhouseLocalPath=./clickhouse-bin/clickhouse-local
